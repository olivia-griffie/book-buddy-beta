name: Build Installers

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          WIN_CSC_IDENTITY_AUTO_DISCOVERY: false
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: releases/*.exe
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Mac icon
        run: |
          # Pad icon to square then scale to 512x512 (minimum for icns conversion)
          sips -p 399 399 public/icon.png --out /tmp/icon_sq.png
          sips -z 512 512 /tmp/icon_sq.png --out public/icon.png

      - name: Build Mac installer
        run: npx electron-builder --mac --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload Mac installer
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: releases/*.dmg
          if-no-files-found: error
