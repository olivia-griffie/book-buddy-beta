<section class="page settings-page">
  <div class="page-header">
    <div>
      <p class="eyebrow">Preferences</p>
      <h1>Settings</h1>
    </div>
  </div>

  <div class="settings-grid">
    <div class="settings-section ui-card ui-card-stack">
      <div class="ui-card-head">
        <div class="ui-card-copy">
          <p class="ui-card-kicker">Appearance</p>
          <h2 class="ui-card-title">Display</h2>
        </div>
      </div>
      <div class="settings-rows">
        <div class="settings-row">
          <div class="settings-row-copy">
            <p class="settings-row-label">Dark Mode</p>
            <p class="settings-row-description">Switch to a darker color scheme to reduce eye strain.</p>
          </div>
          <button
            id="toggle-dark-mode"
            class="settings-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            aria-label="Toggle dark mode"
          >
            <span class="settings-toggle-thumb"></span>
          </button>
        </div>

        <div class="settings-row">
          <div class="settings-row-copy">
            <p class="settings-row-label">Tablet Mode</p>
            <p class="settings-row-description">Constrain the layout to a compact tablet-width view.</p>
          </div>
          <button
            id="toggle-tablet-mode"
            class="settings-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            aria-label="Toggle tablet mode"
          >
            <span class="settings-toggle-thumb"></span>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
