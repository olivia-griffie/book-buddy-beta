<section class="page community-page">
  <div class="page-header">
    <div>
      <p class="eyebrow">Social</p>
      <h1>Community</h1>
      <p>Browse stories other writers have published.</p>
    </div>
  </div>
  <div class="community-filters">
    <button class="community-filter-btn is-active" type="button" data-community-filter="all">All Stories</button>
    <button class="community-filter-btn" type="button" data-community-filter="favorites">Favorites</button>
  </div>
  <div id="community-content" class="community-list" style="display:none;"></div>
  <div id="community-empty" class="empty-state card" style="display:none;">
    <h2>No public stories yet</h2>
    <p>Be the first — publish a chapter from your project to appear here.</p>
  </div>
  <div id="community-loading" class="community-loading">Loading stories…</div>
</section>

<div id="chapter-reader" class="chapter-reader" style="display:none;" role="dialog" aria-modal="true">
  <div class="chapter-reader-inner">
    <div class="chapter-reader-topbar">
      <div class="chapter-reader-topbar-left">
        <button class="chapter-reader-back" id="reader-close" type="button" aria-label="Close reader">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="16" height="16"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Back
        </button>
        <span class="chapter-reader-breadcrumb">
          <span id="reader-project-name"></span>
          <span class="reader-breadcrumb-sep">›</span>
          <span id="reader-chapter-name"></span>
        </span>
      </div>
    </div>
    <div class="chapter-reader-scroll">
      <article class="chapter-reader-prose">
        <header class="chapter-reader-header">
          <h1 id="reader-chapter-title" class="reader-chapter-title"></h1>
          <div class="reader-meta-row">
            <span id="reader-author-name" class="reader-author-name"></span>
            <span class="reader-meta-sep">·</span>
            <span id="reader-published-at" class="reader-published-at"></span>
            <span class="reader-meta-sep">·</span>
            <button id="reader-like-btn" class="reader-like-btn" type="button" aria-label="Like this chapter">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="15" height="15" stroke="currentColor" stroke-width="1.7"><path d="M10 17s-7-4.35-7-9a4 4 0 0 1 7-2.65A4 4 0 0 1 17 8c0 4.65-7 9-7 9z" stroke-linejoin="round"/></svg>
              <span id="reader-like-count">0</span>
            </button>
          </div>
        </header>
        <div id="reader-body" class="reader-body"></div>
      </article>
      <section class="chapter-reader-comments">
        <h2 class="reader-comments-heading">Comments</h2>
        <div id="reader-comments-list" class="reader-comments-list"></div>
        <div class="reader-comment-form">
          <textarea id="reader-comment-input" class="reader-comment-input" placeholder="Leave a comment…" rows="3"></textarea>
          <button id="reader-comment-submit" class="btn btn-save" type="button">Post Comment</button>
        </div>
      </section>
    </div>
  </div>
</div>
