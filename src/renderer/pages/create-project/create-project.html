<section class="page create-project-page">
  <div class="page-header">
    <div>
      <p class="eyebrow">Create Project</p>
      <h1>Build Your Story Setup</h1>
      <p>Choose one or two genres so Book Buddy can shape your plot prompts around them.</p>
    </div>
  </div>

  <form id="create-project-form" class="project-form card">
    <div class="form-grid">
      <div class="field">
        <label for="project-title">Project Title</label>
        <input id="project-title" name="title" type="text" maxlength="120" required />
      </div>
      <div class="field">
        <label for="project-subtitle">Subtitle or Hook</label>
        <input id="project-subtitle" name="subtitle" type="text" maxlength="160" />
      </div>
      <div class="field">
        <label for="project-goal">Word Count Goal</label>
        <input id="project-goal" name="wordCountGoal" type="number" min="0" step="100" value="60000" />
      </div>
    </div>

    <section class="goal-progress-card">
      <div class="goal-progress-head">
        <div id="project-goal-icon" class="progress-status-icon" aria-hidden="true">•</div>
        <div>
          <div class="goal-progress-meta">
            <span id="project-goal-percent" class="goal-progress-percent">0%</span>
            <span id="project-goal-state" class="goal-progress-state">in progress</span>
          </div>
          <p id="project-goal-caption" class="goal-progress-caption">0 of 60,000 words</p>
        </div>
      </div>
      <div class="goal-progress-track">
        <div id="project-goal-fill" class="goal-progress-fill"></div>
      </div>
    </section>

    <div class="genre-panel">
      <div class="genre-panel-header">
        <div>
          <label>Genres</label>
          <p>Select up to two genres to unlock hybrid guidance.</p>
        </div>
        <span id="genre-count" class="selection-badge">0 selected</span>
      </div>
      <div id="genre-options" class="genre-options"></div>
    </div>

    <div class="form-actions">
      <p id="form-message" class="form-message" aria-live="polite"></p>
      <button class="btn btn-primary" type="submit">Save And Build Plot</button>
    </div>
  </form>
</section>
