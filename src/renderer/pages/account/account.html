<section class="page account-page">
  <div class="page-header">
    <div>
      <p class="eyebrow">Cloud & Sync</p>
      <h1>Account</h1>
    </div>
  </div>

  <!-- Logged-out state -->
  <div id="account-logged-out" class="account-panel" hidden>
    <div class="account-auth-tabs">
      <button class="account-tab is-active" data-tab="signin">Sign In</button>
      <button class="account-tab" data-tab="signup">Create Account</button>
    </div>

    <!-- Sign In -->
    <div id="account-tab-signin" class="account-tab-panel ui-card ui-card-stack">
      <div class="account-form-body">
        <p class="account-form-intro">Sign in to sync your projects to the cloud and enable sharing.</p>
        <div id="signin-error" class="account-error" role="alert" hidden></div>
        <form id="signin-form" novalidate>
          <div class="account-fields">
            <div class="account-field">
              <label for="signin-email">Email</label>
              <input id="signin-email" type="email" name="email" autocomplete="email" placeholder="you@example.com" required />
            </div>
            <div class="account-field">
              <label for="signin-password">Password</label>
              <input id="signin-password" type="password" name="password" autocomplete="current-password" placeholder="••••••••" required />
            </div>
          </div>
          <button id="signin-submit" class="btn btn-save account-submit" type="submit">Sign In</button>
        </form>
      </div>
    </div>

    <!-- Sign Up -->
    <div id="account-tab-signup" class="account-tab-panel ui-card ui-card-stack" hidden>
      <div class="account-form-body">
        <p class="account-form-intro">Create a free account to back up your work and share projects with others.</p>
        <div id="signup-error" class="account-error" role="alert" hidden></div>
        <form id="signup-form" novalidate>
          <div class="account-fields">
            <div class="account-field">
              <label for="signup-email">Email</label>
              <input id="signup-email" type="email" name="email" autocomplete="email" placeholder="you@example.com" required />
            </div>
            <div class="account-field">
              <label for="signup-username">Username</label>
              <input id="signup-username" type="text" name="username" autocomplete="username" placeholder="writerhandle" required />
            </div>
            <div class="account-field">
              <label for="signup-password">Password</label>
              <input id="signup-password" type="password" name="password" autocomplete="new-password" placeholder="At least 8 characters" required />
            </div>
          </div>
          <button id="signup-submit" class="btn btn-save account-submit" type="submit">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Logged-in state -->
  <div id="account-logged-in" class="account-panel" hidden>
    <div class="account-profile ui-card ui-card-stack">
      <div class="ui-card-head">
        <div class="ui-card-copy">
          <p class="ui-card-kicker">Signed In</p>
          <h2 class="ui-card-title" id="account-display-name">Your Account</h2>
        </div>
        <button id="account-signout" class="btn btn-ghost" type="button">Sign Out</button>
      </div>
      <div class="account-profile-rows">
        <div class="account-profile-row">
          <span class="account-profile-label">Username</span>
          <span class="account-profile-value" id="account-username">—</span>
        </div>
        <div class="account-profile-row">
          <span class="account-profile-label">Email</span>
          <span class="account-profile-value" id="account-email">—</span>
        </div>
      </div>
    </div>

    <div class="account-edit-profile ui-card ui-card-stack">
      <div class="ui-card-head">
        <div class="ui-card-copy">
          <p class="ui-card-kicker">Public Profile</p>
          <h2 class="ui-card-title">Edit Profile</h2>
        </div>
      </div>
      <div class="account-form-body account-profile-edit-body">
        <div id="profile-save-message" class="account-profile-msg" hidden></div>
        <div class="account-fields">
          <div class="account-field">
            <label for="profile-display-name">Display Name</label>
            <input id="profile-display-name" type="text" maxlength="60" placeholder="Your public name" />
          </div>
          <div class="account-field">
            <label for="profile-bio">Bio</label>
            <textarea id="profile-bio" rows="3" maxlength="300" placeholder="A short bio visible to other users"></textarea>
          </div>
          <div class="account-field">
            <label>Avatar</label>
            <div id="avatar-picker" class="avatar-picker"></div>
          </div>
          <div class="account-field">
            <label>Border Color</label>
            <div id="avatar-color-picker" class="avatar-color-picker"></div>
          </div>
        </div>
        <button id="profile-save-btn" class="btn btn-save" type="button">Save Profile</button>
      </div>
    </div>
  </div>
</section>
