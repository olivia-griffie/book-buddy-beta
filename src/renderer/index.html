<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self' https://formspree.io https://*.supabase.co;"
  />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inkbug Beta</title>
  <link rel="icon" href="../../public/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="../../public/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../../public/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="../../public/apple-touch-icon.png" />
  <link rel="manifest" href="../../public/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/global.css" />
  <link rel="stylesheet" href="./styles/login.css" />
</head>
<body>
  <div id="update-banner" style="
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 9999;
    background: #2f3545;
    color: #fff7f3;
    padding: 12px 20px;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    box-shadow: 0 -4px 20px rgba(47,53,69,0.25);
    transform: translateY(100%);
    transition: transform 280ms ease;
  ">
    <div style="display:flex; align-items:center; gap:10px;">
      <span id="update-banner-icon">⬇</span>
      <span id="update-banner-text">Downloading update...</span>
    </div>
    <div style="display:flex; gap:8px; flex-shrink:0;">
      <button id="update-install-btn" style="
        display: none;
        padding: 6px 14px;
        background: #ff8a3d;
        color: white;
        border: none;
        border-radius: 6px;
        font-family: inherit;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
      ">Restart &amp; Update</button>
      <button id="update-dismiss-btn" style="
        padding: 6px 10px;
        background: transparent;
        color: rgba(255,247,243,0.6);
        border: 1px solid rgba(255,247,243,0.2);
        border-radius: 6px;
        font-family: inherit;
        font-size: 0.8rem;
        cursor: pointer;
      ">Later</button>
    </div>
  </div>

  <!-- Loading screen (shown during auth check, hidden after) -->
  <div id="app-loading" class="app-loading">
    <img id="app-loading-logo" src="../../public/loading-logo.png" alt="Inkbug" class="app-loading-logo" />
    <div class="app-loading-spinner"></div>
  </div>

  <!-- Login overlay (starts hidden; shown only if not authenticated) -->
  <div id="auth-overlay" class="auth-overlay" style="display:none;">
    <div class="auth-card">
      <div class="auth-brand">
        <img id="auth-logo" src="../../public/logo-full.png" alt="Inkbug" style="height:48px;margin-bottom:12px;" />
        <p class="auth-brand-tagline">Your writer's hub — sign in to continue.</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab is-active" data-auth-tab="signin" type="button">Sign In</button>
        <button class="auth-tab" data-auth-tab="signup" type="button">Create Account</button>
      </div>

      <!-- Sign In -->
      <div id="auth-panel-signin" class="auth-panel">
        <div id="auth-signin-error" class="auth-error" role="alert"></div>
        <form id="auth-signin-form" novalidate>
          <div class="auth-fields">
            <div class="auth-field">
              <label for="auth-signin-email">Email</label>
              <input id="auth-signin-email" type="email" autocomplete="email" placeholder="you@example.com" required />
            </div>
            <div class="auth-field">
              <label for="auth-signin-password">Password</label>
              <div class="auth-password-wrap">
                <input id="auth-signin-password" type="password" autocomplete="current-password" placeholder="••••••••" required />
                <button type="button" class="auth-password-toggle" aria-label="Show password" data-target="auth-signin-password"></button>
              </div>
            </div>
          </div>
          <button id="auth-signin-submit" class="auth-submit" type="submit">Sign In</button>
        </form>
      </div>

      <!-- Sign Up -->
      <div id="auth-panel-signup" class="auth-panel" style="display:none;">
        <div id="auth-signup-error" class="auth-error" role="alert"></div>
        <form id="auth-signup-form" novalidate>
          <div class="auth-fields">
            <div class="auth-field">
              <label for="auth-signup-email">Email</label>
              <input id="auth-signup-email" type="email" autocomplete="email" placeholder="you@example.com" required />
            </div>
            <div class="auth-field">
              <label for="auth-signup-display-name">Display name</label>
              <input id="auth-signup-display-name" type="text" autocomplete="name" placeholder="Your pen name" required />
            </div>
            <div class="auth-field">
              <label for="auth-signup-password">Password</label>
              <div class="auth-password-wrap">
                <input id="auth-signup-password" type="password" autocomplete="new-password" placeholder="At least 8 characters" required />
                <button type="button" class="auth-password-toggle" aria-label="Show password" data-target="auth-signup-password"></button>
              </div>
            </div>
          </div>
          <button id="auth-signup-submit" class="auth-submit" type="submit">Create Account</button>
        </form>
        <p id="auth-signup-confirm" style="display:none;text-align:center;font-size:0.875rem;color:var(--ink-muted);margin-top:16px;">Account created! Check your email to confirm, then sign in.</p>
      </div>
    </div>
  </div>

  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>
  <div class="app-shell">
    <aside id="sidebar-container" class="app-sidebar"></aside>
    <div id="app-workspace" class="app-workspace">
      <header id="topbar-container" class="app-topbar"></header>
      <main id="main-content" class="app-main"></main>
      <aside id="reference-drawer-container" class="reference-drawer-shell is-hidden" aria-hidden="true"></aside>
    </div>
  </div>

  <!-- What's New modal -->
  <div id="whats-new-overlay" style="
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: rgba(47,38,31,0.45);
    align-items: center;
    justify-content: center;
  ">
    <div style="
      background: #faf7f2;
      border-radius: 14px;
      padding: 36px 40px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(47,38,31,0.18);
      font-family: 'DM Sans', sans-serif;
      color: #2f261f;
    ">
      <h2 id="whats-new-headline" style="
        font-family: 'Pacifico', cursive;
        font-size: 1.35rem;
        font-weight: 400;
        text-transform: lowercase;
        margin: 0 0 18px;
        color: #2f261f;
      "></h2>
      <ul id="whats-new-features" style="
        margin: 0 0 28px;
        padding-left: 20px;
        line-height: 1.7;
        font-size: 0.95rem;
        color: #5a4a3a;
      "></ul>
      <button id="whats-new-dismiss" style="
        display: block;
        width: 100%;
        padding: 10px;
        background: #ff8a3d;
        color: white;
        border: none;
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      ">Got it</button>
    </div>
  </div>

  <link rel="stylesheet" href="./components/shared/tag-manager.css" />
  <script src="./components/shared/tag-manager.js"></script>
  <script src="./components/shared/sidebar.js"></script>
  <script src="./components/shared/topbar.js"></script>
  <script src="./components/shared/reference-drawer.js"></script>
  <script src="./components/shared/project-store.js"></script>
  <script src="./components/editor/text-editor.js"></script>
  <script src="./changelog.js"></script>
  <script src="./utils/prompt-scorer.js"></script>
  <script src="./renderer.js"></script>
  <script src="./updater.js"></script>
</body>
</html>
